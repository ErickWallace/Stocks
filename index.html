<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Dashboard de Investimentos</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  padding: 20px;
}

h1 {
  text-align: center;
}

.cards {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
  margin-bottom: 20px;
}

.card {
  flex: 1;
  min-width: 200px;
  background: #1e293b;
  padding: 20px;
  border-radius: 10px;
  text-align: center;
}

canvas {
  background: white;
  border-radius: 10px;
  padding: 10px;
  margin-top: 20px;
}

select {
  padding: 8px;
  margin-bottom: 20px;
  border-radius: 6px;
}
</style>
</head>

<body>

<h1>📊 Dashboard de Investimentos</h1>

<select id="filtroAtivo">
  <option value="Todos">Todos os ativos</option>
</select>

<div class="cards">
  <div class="card">
    <h3>💰 Total Investido</h3>
    <p id="total">-</p>
  </div>
  <div class="card">
    <h3>📊 Nº de Operações</h3>
    <p id="operacoes">-</p>
  </div>
  <div class="card">
    <h3>📈 Resultado (PnL)</h3>
    <p id="pnl">-</p>
  </div>
</div>

<canvas id="linhaChart"></canvas>
<canvas id="pizzaChart"></canvas>

<script>
const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQe-6MygeRUixx0XOdtZrSvlgvBrx82peKMF8tp9IkC_bZkSR_vANXNW3GjuZNkeApQS16AAWQORbHs/pub?output=csv";

let linhaChart = null;
let pizzaChart = null;

async function fetchData() {
  const res = await fetch(url);
  const text = await res.text();
  return parseCSV(text);
}

function parseCSV(data) {
  const linhas = data.trim().split("\n");
  const separador = linhas[0].includes(";") ? ";" : ",";

  const rows = linhas.map(r => r.split(separador));
  const headers = rows[0].map(h => h.trim());

  return rows.slice(1).map(row => {
    let obj = {};
    headers.forEach((h, i) => obj[h] = row[i]);
    return obj;
  });
}

function parseValor(valor) {
  return parseFloat(
    (valor || "0")
      .replace(/\./g, "")
      .replace(",", ".")
  ) || 0;
}

// 🔥 FUNÇÃO CORRIGIDA (NUNCA QUEBRA)
function enrichRows(data) {
  return data.map(d => {
    const qty = parseValor(d["Quantidade"]);
    const avgPrice = parseValor(d["Preço Médio"]);
    const curPrice = parseValor(d["Preço Atual"]);
    const totalVal = parseValor(d["Valor Total"]);

    const cost =
      (!isNaN(qty) && !isNaN(avgPrice) && qty > 0)
        ? qty * avgPrice
        : totalVal;

    const marketValue =
      (!isNaN(qty) && !isNaN(curPrice) && qty > 0)
        ? qty * curPrice
        : totalVal;

    const pnl =
      (!isNaN(marketValue) && !isNaN(cost))
        ? marketValue - cost
        : 0;

    return {
      ...d,
      _ativo: d["Ativo"],
      _data: d["Data"],
      _valor: totalVal,
      _cost: cost,
      _marketValue: marketValue,
      _pnl: pnl
    };
  });
}

function calcularIndicadores(data) {
  let total = 0;
  let pnl = 0;

  data.forEach(d => {
    total += d._cost || 0;
    pnl += d._pnl || 0;
  });

  return {
    total: total,
    pnl: pnl,
    operacoes: data.length
  };
}

function popularFiltro(data) {
  const ativos = [...new Set(data.map(d => d._ativo).filter(Boolean))];
  const select = document.getElementById("filtroAtivo");

  ativos.forEach(a => {
    let opt = document.createElement("option");
    opt.value = a;
    opt.textContent = a;
    select.appendChild(opt);
  });
}

function gerarGraficoLinha(data) {
  const agrupado = {};

  data.forEach(d => {
    if (!d._data) return;

    if (!agrupado[d._data]) agrupado[d._data] = 0;

    agrupado[d._data] += d._cost;
  });

  const datas = Object.keys(agrupado).sort((a, b) => new Date(a) - new Date(b));

  let acumulado = 0;

  const valores = datas.map(d => {
    acumulado += agrupado[d];
    return acumulado;
  });

  if (linhaChart) linhaChart.destroy();

  linhaChart = new Chart(document.getElementById("linhaChart"), {
    type: "line",
    data: {
      labels: datas,
      datasets: [{
        label: "Capital Investido",
        data: valores,
        tension: 0.3
      }]
    }
  });
}

function gerarPizza(data) {
  const agrupado = {};

  data.forEach(d => {
    if (!d._ativo) return;

    agrupado[d._ativo] = (agrupado[d._ativo] || 0) + d._cost;
  });

  if (pizzaChart) pizzaChart.destroy();

  pizzaChart = new Chart(document.getElementById("pizzaChart"), {
    type: "pie",
    data: {
      labels: Object.keys(agrupado),
      datasets: [{
        data: Object.values(agrupado)
      }]
    }
  });
}

function aplicarFiltro(data) {
  const filtro = document.getElementById("filtroAtivo").value;

  if (filtro === "Todos") return data;

  return data.filter(d => d._ativo === filtro);
}

async function init() {
  let raw = await fetchData();
  let data = enrichRows(raw);

  popularFiltro(data);

  function render() {
    let filtrado = aplicarFiltro(data);

    const ind = calcularIndicadores(filtrado);

    document.getElementById("total").innerText =
      "R$ " + ind.total.toLocaleString("pt-BR", {minimumFractionDigits: 2});

    document.getElementById("operacoes").innerText =
      ind.operacoes;

    document.getElementById("pnl").innerText =
      "R$ " + ind.pnl.toLocaleString("pt-BR", {minimumFractionDigits: 2});

    gerarGraficoLinha(filtrado);
    gerarPizza(filtrado);
  }

  document.getElementById("filtroAtivo").addEventListener("change", render);

  render();
}

init();
</script>

</body>
</html>
