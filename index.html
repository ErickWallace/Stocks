<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FII Performance</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;
  --surface:#111111;
  --surface2:#161616;
  --surface3:#1e1e1e;
  --surface4:#242424;
  --text:#e8e8e8;
  --text2:#888888;
  --text3:#555555;
  --border:rgba(255,255,255,0.06);
  --border2:rgba(255,255,255,0.12);
  --green:#00c853;
  --green-dim:#00a844;
  --green-bg:rgba(0,200,83,0.08);
  --red:#ff4444;
  --red-dim:#cc3333;
  --red-bg:rgba(255,68,68,0.08);
  --blue:#4a9eff;
  --amber:#ffb300;
  --accent:#00c853;
  --r:8px;--r-sm:5px;
}
body{
  font-family:'IBM Plex Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  font-size:13px;
}

/* HEADER */
.header{
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:14px 28px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  position:sticky;top:0;z-index:200;
}
.logo{
  font-family:'IBM Plex Mono',monospace;
  font-size:14px;font-weight:700;letter-spacing:0.05em;
  color:var(--text);display:flex;align-items:center;gap:10px;
}
.logo-dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--green);
  box-shadow:0 0 8px var(--green);
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.logo span{color:var(--green)}
.header-meta{
  font-family:'IBM Plex Mono',monospace;
  font-size:11px;color:var(--text3);margin-top:3px;letter-spacing:0.03em;
}
.refresh-btn{
  font-family:'IBM Plex Mono',monospace;
  background:transparent;
  color:var(--text2);
  border:1px solid var(--border2);
  padding:7px 16px;
  border-radius:var(--r-sm);
  font-size:11px;font-weight:500;
  cursor:pointer;
  display:flex;align-items:center;gap:6px;
  transition:all .15s;letter-spacing:0.05em;
}
.refresh-btn:hover{color:var(--text);border-color:var(--text3);background:var(--surface2)}
.refresh-btn:disabled{opacity:.3;cursor:not-allowed}
@keyframes spin{to{transform:rotate(360deg)}}
.spinning{animation:spin .8s linear infinite;display:inline-block}

/* TABS */
.tabs{
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:0 28px;display:flex;gap:2px;
}
.tab{
  font-family:'IBM Plex Mono',monospace;
  padding:11px 18px;font-size:11px;font-weight:500;
  color:var(--text3);cursor:pointer;
  border-bottom:1px solid transparent;
  transition:all .15s;white-space:nowrap;
  letter-spacing:0.06em;text-transform:uppercase;
}
.tab:hover{color:var(--text2)}
.tab.active{color:var(--green);border-bottom-color:var(--green)}

/* LAYOUT */
.main{max-width:1200px;margin:0 auto;padding:20px}
.section{display:none}
.section.active{display:block}

/* KPI STRIP */
.kpis{
  display:grid;grid-template-columns:repeat(5,1fr);
  gap:1px;
  background:var(--border);
  border:1px solid var(--border);
  border-radius:var(--r);
  overflow:hidden;
  margin-bottom:16px;
}
.kpi{
  background:var(--surface);
  padding:18px 20px;
}
.kpi-label{
  font-family:'IBM Plex Mono',monospace;
  font-size:9px;color:var(--text3);
  text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;
}
.kpi-value{
  font-family:'IBM Plex Mono',monospace;
  font-size:20px;font-weight:700;letter-spacing:-.5px;line-height:1;
}
.kpi-sub{
  font-family:'IBM Plex Mono',monospace;
  font-size:10px;margin-top:6px;color:var(--text3);
}

/* COLORS */
.pos{color:var(--green)}
.neg{color:var(--red)}

/* CARDS */
.row2{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:16px}
.card{
  background:var(--surface);
  padding:18px 20px;
  margin-bottom:16px;
  border:1px solid var(--border);
  border-radius:var(--r);
}
.card:last-child{margin-bottom:0}
.card-inline{background:var(--surface);padding:18px 20px;margin-bottom:0}
.card-title{
  font-family:'IBM Plex Mono',monospace;
  font-size:10px;font-weight:600;
  margin-bottom:3px;text-transform:uppercase;
  letter-spacing:.08em;color:var(--text2);
}
.card-sub{font-size:11px;color:var(--text3);margin-bottom:16px}

/* TABLE */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{
  font-family:'IBM Plex Mono',monospace;
  font-size:9px;color:var(--text3);
  text-transform:uppercase;letter-spacing:.1em;font-weight:500;
  padding:8px 12px;border-bottom:1px solid var(--border);
  text-align:left;white-space:nowrap;
}
td{
  font-family:'IBM Plex Mono',monospace;
  padding:10px 12px;border-bottom:1px solid var(--border);
  vertical-align:middle;white-space:nowrap;
}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--surface2)}
td.num{text-align:right;font-variant-numeric:tabular-nums}
th.num{text-align:right}
tfoot td{background:var(--surface2)!important}

/* FII GRID (Por Fundo) */
.fii-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));
  gap:1px;background:var(--border);
  border:1px solid var(--border);border-radius:var(--r);
  overflow:hidden;margin-bottom:16px;
}
.fii-card{
  background:var(--surface);
  padding:14px 16px;
  cursor:pointer;transition:background .12s;
}
.fii-card:hover{background:var(--surface2)}
.fii-card.selected{background:var(--surface3);outline:1px solid var(--green) inset}
.fii-ticker{
  font-family:'IBM Plex Mono',monospace;
  font-size:14px;font-weight:700;margin-bottom:8px;
}
.fii-mini-kpis{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.fii-mk{
  background:var(--surface2);border-radius:4px;padding:6px 8px;
}
.fii-mk-label{
  font-family:'IBM Plex Mono',monospace;
  font-size:9px;color:var(--text3);margin-bottom:3px;letter-spacing:.05em;text-transform:uppercase;
}
.fii-mk-val{
  font-family:'IBM Plex Mono',monospace;
  font-size:12px;font-weight:600;
}

/* DETAIL */
.detail-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;display:none;margin-top:16px}
.detail-box.open{display:block}
.detail-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.detail-ticker{
  font-family:'IBM Plex Mono',monospace;
  font-size:24px;font-weight:700;letter-spacing:-.5px;
}
.ret-badge{
  font-family:'IBM Plex Mono',monospace;
  padding:6px 16px;border-radius:4px;font-size:13px;font-weight:700;
}
.detail-kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:16px}
.dk{background:var(--surface2);padding:14px 16px}
.dk-label{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text3);margin-bottom:5px;text-transform:uppercase;letter-spacing:.08em}
.dk-val{font-family:'IBM Plex Mono',monospace;font-size:17px;font-weight:700}

/* MISC */
.error-banner{background:var(--red-bg);color:var(--red);border:1px solid rgba(255,68,68,.2);padding:12px 16px;border-radius:var(--r-sm);font-size:13px;font-family:'IBM Plex Mono',monospace;margin-bottom:16px;display:none}
.loading-msg{text-align:center;padding:60px;color:var(--text3);font-size:13px;font-family:'IBM Plex Mono',monospace;letter-spacing:.1em}
.last-up{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text3);text-align:right;margin-top:14px;letter-spacing:.04em}
.section-sep{height:16px}

/* HIGHLIGHT CARDS */
.highlight-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:20px;
}
.highlight-val{
  font-family:'IBM Plex Mono',monospace;
  font-size:36px;font-weight:700;line-height:1;margin:10px 0 4px;
}
.highlight-ret{
  font-family:'IBM Plex Mono',monospace;
  font-size:22px;font-weight:700;margin-bottom:14px;
}
.highlight-row{
  font-family:'IBM Plex Mono',monospace;
  font-size:11px;color:var(--text3);margin-top:4px;
}
.highlight-row span{color:var(--text2)}

@media(max-width:900px){
  .kpis{grid-template-columns:repeat(3,1fr)}
  .row2{grid-template-columns:1fr}
  .detail-kpis{grid-template-columns:repeat(3,1fr)}
}
@media(max-width:600px){
  .kpis{grid-template-columns:repeat(2,1fr)}
  .main{padding:12px}
  .header,.tabs{padding-left:14px;padding-right:14px}
  .tab{padding:10px 12px}
  .detail-kpis{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>
<div class="header">
  <div>
    <div class="logo">
      <div class="logo-dot"></div>
      FII <span>&nbsp;Performance</span>
    </div>
    <div class="header-meta" id="header-meta">aguardando dados...</div>
  </div>
  <button class="refresh-btn" id="refresh-btn" onclick="loadData()">
    <span id="ref-icon">↻</span> ATUALIZAR
  </button>
</div>
<div class="tabs">
  <div class="tab active" onclick="switchTab('overview',this)">Visão Geral</div>
  <div class="tab" onclick="switchTab('detail',this)">Por Fundo</div>
  <div class="tab" onclick="switchTab('tbl',this)">Tabela Completa</div>
</div>
<div class="main">
  <div id="error-banner" class="error-banner"></div>
  <div id="overview" class="section active"><div class="loading-msg">BUSCANDO DADOS DA PLANILHA...</div></div>
  <div id="detail" class="section"></div>
  <div id="tbl" class="section"></div>
</div>
<script>
const SHEET_ID='13KMh1amahbvivDW1GsEi8UL8qSbrcPDpQlNoLio81oQ';
const SHEET_NAME='Carteira';
let charts={};
let allFiis=[];

// Chart.js dark defaults
Chart.defaults.color='#555555';
Chart.defaults.borderColor='rgba(255,255,255,0.06)';

function switchTab(id,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  el.classList.add('active');
  document.getElementById(id).classList.add('active');
}
function parseNum(v){
  if(v===null||v===undefined||v==='')return null;
  if(typeof v==='number')return v;
  const s=String(v).replace(/R\$\s*/g,'').replace(/\./g,'').replace(',','.').replace(/%/g,'').trim();
  const n=parseFloat(s);return isNaN(n)?null:n;
}
function fmtBRL(n,dec=2){if(n===null||n===undefined)return'—';return'R$ '+n.toLocaleString('pt-BR',{minimumFractionDigits:dec,maximumFractionDigits:dec})}
function fmtPct(n,dec=2){if(n===null||n===undefined)return'—';return(n>=0?'+':'')+n.toFixed(dec)+'%'}
function cc(n){return(n||0)>=0?'var(--green)':'var(--red)'}
function destroyChart(id){if(charts[id]){charts[id].destroy();delete charts[id];}}

async function loadData(){
  const btn=document.getElementById('refresh-btn');
  const icon=document.getElementById('ref-icon');
  btn.disabled=true;icon.className='spinning';icon.textContent='↻';
  const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;
  try{
    const res=await fetch(url);
    const text=await res.text();
    const json=JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
    const rows=json.table.rows;
    let hi=-1;
    for(let i=0;i<rows.length;i++){const c=rows[i].c;if(c&&c[0]&&c[0].v&&String(c[0].v).trim()==='FII'){hi=i;break;}}
    const fiis=[];
    for(let i=hi+1;i<rows.length;i++){
      const c=rows[i].c;
      if(!c||!c[0]||!c[0].v)continue;
      const ticker=String(c[0].v).trim();
      if(ticker.toUpperCase().includes('TOTAL'))break;
      if(ticker.length<4)continue;
      let qtd=parseNum(c[1]?c[1].v:null);
      let pago=parseNum(c[2]?c[2].v:null);
      let atual=parseNum(c[3]?c[3].v:null);
      let pMed=parseNum(c[4]?c[4].v:null);
      let pAtual=parseNum(c[5]?c[5].v:null);
      let ret=parseNum(c[6]?c[6].v:null);
      let pCart=parseNum(c[7]?c[7].v:null);
      if(ret!==null&&Math.abs(ret)>1)ret=ret/100;
      if(pCart!==null&&pCart>1)pCart=pCart/100;
      const saldo=(pago!==null&&atual!==null)?atual-pago:null;
      const retPorCota=(pMed!==null&&pAtual!==null)?pAtual-pMed:null;
      const retPorCotaPct=(pMed!==null&&retPorCota!==null&&pMed!==0)?retPorCota/pMed:null;
      fiis.push({ticker,qtd,pago,atual,pMed,pAtual,ret,pCart,saldo,retPorCota,retPorCotaPct});
    }
    allFiis=fiis;
    document.getElementById('header-meta').textContent=`${fiis.length} fundos · ${new Date().toLocaleTimeString('pt-BR')}`;
    document.getElementById('error-banner').style.display='none';
    renderOverview(fiis);
    renderDetail(fiis);
    renderTable(fiis);
  }catch(e){
    const eb=document.getElementById('error-banner');
    eb.textContent='ERRO: Verifique se a planilha está pública e tente novamente.';
    eb.style.display='block';
    console.error(e);
  }
  btn.disabled=false;icon.className='';icon.textContent='↻';
}

function renderOverview(fiis){
  const totalPago=fiis.reduce((a,f)=>a+(f.pago||0),0);
  const totalAtual=fiis.reduce((a,f)=>a+(f.atual||0),0);
  const saldo=totalAtual-totalPago;
  const retTotal=totalPago>0?saldo/totalPago:0;
  const totalCotas=fiis.reduce((a,f)=>a+(f.qtd||0),0);
  const positivos=fiis.filter(f=>(f.ret||0)>0).length;
  const melhor=fiis.reduce((a,b)=>((b.ret||0)>(a.ret||0)?b:a));
  const pior=fiis.reduce((a,b)=>((b.ret||0)<(a.ret||0)?b:a));
  const byRet=[...fiis].sort((a,b)=>(b.ret||0)-(a.ret||0));
  const bySaldo=[...fiis].sort((a,b)=>(b.saldo||0)-(a.saldo||0));
  const byAlloc=[...fiis].sort((a,b)=>(b.pCart||0)-(a.pCart||0));
  const colors=['#00c853','#4a9eff','#ffb300','#ff6b6b','#a78bfa','#34d399','#f472b6','#60a5fa','#fb923c','#a3e635','#38bdf8','#c084fc','#f87171','#fbbf24','#4ade80'];

  document.getElementById('overview').innerHTML=`
  <div class="kpis">
    <div class="kpi">
      <div class="kpi-label">Total Investido</div>
      <div class="kpi-value">${fmtBRL(totalPago,0)}</div>
      <div class="kpi-sub">${fiis.length} fundos</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Valor Atual</div>
      <div class="kpi-value">${fmtBRL(totalAtual,0)}</div>
      <div class="kpi-sub ${saldo>=0?'pos':'neg'}">${saldo>=0?'▲':'▼'} ${fmtBRL(Math.abs(saldo),0)}</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Saldo Total</div>
      <div class="kpi-value ${saldo>=0?'pos':'neg'}">${fmtBRL(saldo,0)}</div>
      <div class="kpi-sub ${retTotal>=0?'pos':'neg'}">${fmtPct(retTotal*100)} retorno</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Total de Cotas</div>
      <div class="kpi-value">${totalCotas.toLocaleString('pt-BR')}</div>
      <div class="kpi-sub">em ${fiis.length} fundos</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">No Positivo</div>
      <div class="kpi-value pos">${positivos}<span style="font-size:13px;font-weight:400;color:var(--text3)">/${fiis.length}</span></div>
      <div class="kpi-sub">${fiis.length-positivos} abaixo do custo</div>
    </div>
  </div>

  <div class="row2">
    <div class="card-inline">
      <p class="card-title">Retorno % por fundo</p>
      <p class="card-sub">ordenado do melhor ao pior</p>
      <div style="position:relative;width:100%;height:${Math.max(220,fiis.length*27)}px"><canvas id="retChart"></canvas></div>
    </div>
    <div class="card-inline">
      <p class="card-title">Composição da carteira</p>
      <p class="card-sub">participação percentual de cada fundo</p>
      <div style="position:relative;width:100%;height:${Math.max(220,fiis.length*27)}px"><canvas id="allocDonut"></canvas></div>
    </div>
  </div>
  <div class="section-sep"></div>
  <div class="row2">
    <div class="card-inline">
      <p class="card-title">Investido vs valor atual</p>
      <p class="card-sub">comparativo de custo e valor de mercado (R$)</p>
      <div style="position:relative;width:100%;height:${Math.max(220,fiis.length*27)}px"><canvas id="compChart"></canvas></div>
    </div>
    <div class="card-inline">
      <p class="card-title">Saldo financeiro por fundo</p>
      <p class="card-sub">lucro ou prejuízo em reais</p>
      <div style="position:relative;width:100%;height:${Math.max(220,fiis.length*27)}px"><canvas id="saldoChart"></canvas></div>
    </div>
  </div>
  <div class="section-sep"></div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
    <div class="highlight-card">
      <div class="card-title" style="color:var(--green)">▲ Destaque da Carteira</div>
      <div class="card-sub">maior retorno percentual</div>
      <div class="highlight-val" style="color:var(--green)">${melhor.ticker}</div>
      <div class="highlight-ret pos">${fmtPct((melhor.ret||0)*100)}</div>
      <div class="highlight-row">Investido: <span>${fmtBRL(melhor.pago)}</span></div>
      <div class="highlight-row">Valor atual: <span>${fmtBRL(melhor.atual)}</span></div>
      <div class="highlight-row">Saldo: <span class="pos" style="font-weight:600">${fmtBRL(melhor.saldo)}</span></div>
    </div>
    <div class="highlight-card">
      <div class="card-title" style="color:var(--red)">▼ Ponto de Atenção</div>
      <div class="card-sub">maior queda percentual</div>
      <div class="highlight-val" style="color:var(--red)">${pior.ticker}</div>
      <div class="highlight-ret neg">${fmtPct((pior.ret||0)*100)}</div>
      <div class="highlight-row">Investido: <span>${fmtBRL(pior.pago)}</span></div>
      <div class="highlight-row">Valor atual: <span>${fmtBRL(pior.atual)}</span></div>
      <div class="highlight-row">Saldo: <span class="neg" style="font-weight:600">${fmtBRL(pior.saldo)}</span></div>
    </div>
  </div>
  <p class="last-up">ÚLTIMA ATUALIZAÇÃO: ${new Date().toLocaleString('pt-BR')}</p>`;

  const chartFont={size:10,family:"'IBM Plex Mono', monospace"};
  const gridColor='rgba(255,255,255,0.05)';
  const tickColor='#555';

  destroyChart('retChart');
  charts['retChart']=new Chart(document.getElementById('retChart'),{type:'bar',
    data:{labels:byRet.map(f=>f.ticker),datasets:[{data:byRet.map(f=>+((f.ret||0)*100).toFixed(2)),
      backgroundColor:byRet.map(f=>(f.ret||0)>=0?'rgba(0,200,83,0.75)':'rgba(255,68,68,0.75)'),
      borderRadius:2,borderSkipped:false}]},
    options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:v=>` ${v.raw>=0?'+':''}${v.raw.toFixed(2)}%`}}},
      scales:{
        x:{ticks:{font:chartFont,color:tickColor,callback:v=>v+'%'},grid:{color:gridColor}},
        y:{ticks:{font:chartFont,color:tickColor},grid:{display:false}}}}});

  destroyChart('allocDonut');
  charts['allocDonut']=new Chart(document.getElementById('allocDonut'),{type:'doughnut',
    data:{labels:byAlloc.map(f=>f.ticker),datasets:[{data:byAlloc.map(f=>+((f.pCart||0)*100).toFixed(1)),
      backgroundColor:colors.slice(0,byAlloc.length),borderWidth:0,hoverOffset:4}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'55%',
      plugins:{legend:{position:'right',labels:{font:chartFont,color:'#888',boxWidth:8,padding:6}},
               tooltip:{callbacks:{label:v=>` ${v.label}: ${v.raw}%`}}}}});

  destroyChart('compChart');
  charts['compChart']=new Chart(document.getElementById('compChart'),{type:'bar',
    data:{labels:fiis.map(f=>f.ticker),datasets:[
      {label:'Investido',data:fiis.map(f=>f.pago||0),backgroundColor:'rgba(74,158,255,0.5)',borderRadius:2},
      {label:'Atual',data:fiis.map(f=>f.atual||0),backgroundColor:'rgba(0,200,83,0.7)',borderRadius:2}]},
    options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{font:chartFont,color:'#888',boxWidth:8}},
               tooltip:{callbacks:{label:v=>` ${v.dataset.label}: ${fmtBRL(v.raw)}`}}},
      scales:{
        x:{ticks:{font:chartFont,color:tickColor,callback:v=>'R$'+Math.round(v/1000)+'k'},grid:{color:gridColor}},
        y:{ticks:{font:chartFont,color:tickColor},grid:{display:false}}}}});

  const bySaldoSort=[...fiis].sort((a,b)=>(b.saldo||0)-(a.saldo||0));
  destroyChart('saldoChart');
  charts['saldoChart']=new Chart(document.getElementById('saldoChart'),{type:'bar',
    data:{labels:bySaldoSort.map(f=>f.ticker),datasets:[{data:bySaldoSort.map(f=>+(f.saldo||0).toFixed(2)),
      backgroundColor:bySaldoSort.map(f=>(f.saldo||0)>=0?'rgba(0,200,83,0.75)':'rgba(255,68,68,0.75)'),
      borderRadius:2,borderSkipped:false}]},
    options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:v=>` ${fmtBRL(v.raw)}`}}},
      scales:{
        x:{ticks:{font:chartFont,color:tickColor,callback:v=>'R$'+Math.round(v)},grid:{color:gridColor}},
        y:{ticks:{font:chartFont,color:tickColor},grid:{display:false}}}}});
}

function renderDetail(fiis){
  const sec=document.getElementById('detail');
  sec.innerHTML=`
  <p style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text3);margin-bottom:14px;letter-spacing:.04em;text-transform:uppercase">SELECIONE UM FUNDO PARA VER OS DETALHES</p>
  <div class="fii-grid">
    ${fiis.map((f,i)=>`
    <div class="fii-card" id="fc-${i}" onclick="selectFii(${i})">
      <div class="fii-ticker">${f.ticker}</div>
      <div class="fii-mini-kpis">
        <div class="fii-mk"><div class="fii-mk-label">Atual</div><div class="fii-mk-val">${fmtBRL(f.atual,0)}</div></div>
        <div class="fii-mk"><div class="fii-mk-label">Retorno</div><div class="fii-mk-val" style="color:${cc(f.ret)}">${fmtPct((f.ret||0)*100,1)}</div></div>
        <div class="fii-mk"><div class="fii-mk-label">Cotas</div><div class="fii-mk-val">${f.qtd||'—'}</div></div>
        <div class="fii-mk"><div class="fii-mk-label">Saldo</div><div class="fii-mk-val" style="color:${cc(f.saldo)}">${fmtBRL(f.saldo,0)}</div></div>
      </div>
    </div>`).join('')}
  </div>
  <div class="detail-box" id="detail-box"></div>`;
}

function selectFii(idx){
  document.querySelectorAll('.fii-card').forEach(c=>c.classList.remove('selected'));
  document.getElementById('fc-'+idx).classList.add('selected');
  const f=allFiis[idx];
  const box=document.getElementById('detail-box');
  const rpcPct=f.retPorCotaPct!==null?f.retPorCotaPct*100:null;
  const retRank=[...allFiis].sort((a,b)=>(b.ret||0)-(a.ret||0)).findIndex(x=>x.ticker===f.ticker)+1;
  const outros=1-(f.pCart||0);
  const isPos=(f.ret||0)>=0;

  box.className='detail-box open';
  box.innerHTML=`
  <div class="detail-header">
    <div>
      <div class="detail-ticker">${f.ticker}</div>
      <div style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text3);margin-top:4px;text-transform:uppercase;letter-spacing:.05em">${f.qtd} cotas · ${((f.pCart||0)*100).toFixed(1)}% da carteira</div>
    </div>
    <span class="ret-badge" style="background:${isPos?'var(--green-bg)':'var(--red-bg)'};color:${isPos?'var(--green)':'var(--red)'};border:1px solid ${isPos?'rgba(0,200,83,.2)':'rgba(255,68,68,.2)'}">${fmtPct((f.ret||0)*100)} retorno total</span>
  </div>
  <div class="detail-kpis">
    <div class="dk"><div class="dk-label">Total Investido</div><div class="dk-val">${fmtBRL(f.pago)}</div></div>
    <div class="dk"><div class="dk-label">Valor Atual</div><div class="dk-val">${fmtBRL(f.atual)}</div></div>
    <div class="dk"><div class="dk-label">Saldo (R$)</div><div class="dk-val" style="color:${cc(f.saldo)}">${fmtBRL(f.saldo)}</div></div>
    <div class="dk"><div class="dk-label">Preço Médio</div><div class="dk-val">${fmtBRL(f.pMed)}</div></div>
    <div class="dk"><div class="dk-label">Preço Atual</div><div class="dk-val">${fmtBRL(f.pAtual)}</div></div>
    <div class="dk"><div class="dk-label">Qtd Cotas</div><div class="dk-val">${f.qtd}</div></div>
    <div class="dk"><div class="dk-label">Ret. por Cota</div><div class="dk-val" style="color:${cc(f.retPorCota)}">${fmtBRL(f.retPorCota)}</div></div>
    <div class="dk"><div class="dk-label">Ret. % por Cota</div><div class="dk-val" style="color:${cc(rpcPct)}">${rpcPct!==null?fmtPct(rpcPct):'—'}</div></div>
    <div class="dk"><div class="dk-label">% da Carteira</div><div class="dk-val">${((f.pCart||0)*100).toFixed(1)}%</div></div>
    <div class="dk"><div class="dk-label">Rank Retorno</div><div class="dk-val">${retRank}º / ${allFiis.length}</div></div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
    <div>
      <p class="card-title" style="margin-bottom:4px">Preço médio vs preço atual</p>
      <div style="position:relative;width:100%;height:120px"><canvas id="det-price"></canvas></div>
    </div>
    <div>
      <p class="card-title" style="margin-bottom:4px">Peso na carteira</p>
      <div style="position:relative;width:100%;height:120px"><canvas id="det-alloc"></canvas></div>
    </div>
  </div>`;

  const chartFont={size:10,family:"'IBM Plex Mono', monospace"};

  destroyChart('det-price');
  charts['det-price']=new Chart(document.getElementById('det-price'),{type:'bar',
    data:{labels:['Preço médio','Preço atual'],datasets:[{data:[f.pMed,f.pAtual],
      backgroundColor:[(f.pAtual||0)>=(f.pMed||0)?'rgba(74,158,255,0.6)':'rgba(255,100,100,0.5)',(f.pAtual||0)>=(f.pMed||0)?'rgba(0,200,83,0.8)':'rgba(255,68,68,0.8)'],
      borderRadius:4,borderSkipped:false}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:v=>` ${fmtBRL(v.raw)}`}}},
      scales:{
        x:{ticks:{font:chartFont,color:'#555'},grid:{display:false}},
        y:{ticks:{font:chartFont,color:'#555',callback:v=>'R$'+v.toFixed(0)},grid:{color:'rgba(255,255,255,0.05)'},
          min:Math.min(f.pMed||0,f.pAtual||0)*0.95}}}});

  destroyChart('det-alloc');
  charts['det-alloc']=new Chart(document.getElementById('det-alloc'),{type:'doughnut',
    data:{labels:[f.ticker,'Outros'],datasets:[{data:[+((f.pCart||0)*100).toFixed(1),+(outros*100).toFixed(1)],
      backgroundColor:['#00c853','#242424'],borderWidth:0}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'62%',
      plugins:{legend:{position:'right',labels:{font:chartFont,color:'#888',boxWidth:8,padding:6}},
               tooltip:{callbacks:{label:v=>` ${v.raw}%`}}}}});

  box.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function renderTable(fiis){
  const totalPago=fiis.reduce((a,f)=>a+(f.pago||0),0);
  const totalAtual=fiis.reduce((a,f)=>a+(f.atual||0),0);
  const totalSaldo=totalAtual-totalPago;
  const totalCotas=fiis.reduce((a,f)=>a+(f.qtd||0),0);
  document.getElementById('tbl').innerHTML=`
  <div class="card">
    <p class="card-title" style="margin-bottom:16px">Todos os Fundos — Visão Completa</p>
    <div class="table-wrap">
    <table>
      <thead><tr>
        <th>Fundo</th><th class="num">Cotas</th><th class="num">Preço Médio</th>
        <th class="num">Preço Atual</th><th class="num">Ret. Cota</th>
        <th class="num">Ret. % Cota</th><th class="num">Total Inv.</th>
        <th class="num">Valor Atual</th><th class="num">Saldo</th>
        <th class="num">Retorno %</th><th class="num">% Cart.</th>
      </tr></thead>
      <tbody>
        ${fiis.map(f=>{const rpc=f.retPorCotaPct!==null?f.retPorCotaPct*100:null;return`<tr>
          <td style="font-weight:700;color:var(--text)">${f.ticker}</td>
          <td class="num">${f.qtd||'—'}</td>
          <td class="num">${fmtBRL(f.pMed)}</td>
          <td class="num">${fmtBRL(f.pAtual)}</td>
          <td class="num" style="color:${cc(f.retPorCota)}">${fmtBRL(f.retPorCota)}</td>
          <td class="num" style="color:${cc(rpc)}">${rpc!==null?fmtPct(rpc):'—'}</td>
          <td class="num">${fmtBRL(f.pago)}</td>
          <td class="num">${fmtBRL(f.atual)}</td>
          <td class="num" style="color:${cc(f.saldo)};font-weight:600">${fmtBRL(f.saldo)}</td>
          <td class="num" style="color:${cc(f.ret)};font-weight:600">${fmtPct((f.ret||0)*100)}</td>
          <td class="num">${((f.pCart||0)*100).toFixed(1)}%</td>
        </tr>`;}).join('')}
      </tbody>
      <tfoot><tr>
        <td style="font-weight:700;color:var(--text2)">TOTAL</td>
        <td class="num" style="font-weight:700">${totalCotas}</td>
        <td class="num">—</td><td class="num">—</td><td class="num">—</td><td class="num">—</td>
        <td class="num" style="font-weight:700">${fmtBRL(totalPago)}</td>
        <td class="num" style="font-weight:700">${fmtBRL(totalAtual)}</td>
        <td class="num" style="font-weight:700;color:${cc(totalSaldo)}">${fmtBRL(totalSaldo)}</td>
        <td class="num" style="font-weight:700;color:${cc(totalSaldo)}">${fmtPct(totalSaldo/totalPago*100)}</td>
        <td class="num" style="font-weight:700">100%</td>
      </tr></tfoot>
    </table>
    </div>
  </div>
  <p class="last-up">ÚLTIMA ATUALIZAÇÃO: ${new Date().toLocaleString('pt-BR')}</p>`;
}

loadData();
</script>
</body>
</html>
