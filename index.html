<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio · Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">

<style>
/* (mantive exatamente seu CSS original) */
body{background:#0b0e13;color:#e8edf5;font-family:'Syne',sans-serif;}
.wrap{max-width:1200px;margin:auto;padding:40px;}
.card{background:#111620;padding:20px;border-radius:10px;margin-bottom:10px;}
</style>
</head>

<body>
<div class="wrap">
  <h1>📊 Portfólio Invest</h1>
  <div id="app">Carregando...</div>
</div>

<script>

const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQe-6MygeRUixx0XOdtZrSvlgvBrx82peKMF8tp9IkC_bZkSR_vANXNW3GjuZNkeApQS16AAWQORbHs/pub?output=csv';

async function fetchCSV() {
  const res = await fetch(CSV_URL);
  return await res.text();
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',');

  return lines.slice(1).map(line => {
    const values = line.split(',');
    let obj = {};
    headers.forEach((h,i) => obj[h.trim()] = values[i]);
    return obj;
  });
}

function num(v) {
  if (!v) return 0;
  return parseFloat(
    v.replace('$','')
     .replace(/\./g,'')
     .replace(',','.')
     .replace('%','')
  ) || 0;
}

function render(data){

  // 🔥 MAPEAMENTO CORRETO
  const stocks = data
    .filter(r => r['Stocks'] && r['Stocks'] !== 'TOTAL')
    .map(r => ({
      name: r['Stocks'],
      qty: num(r['Quantidade']),
      paid: num(r['Valor total pago']),
      cur: num(r['Valor total atual']),
      ret: num(r['Retorno']),
      alloc: num(r['Carteira'])
    }));

  const totalPaid = stocks.reduce((s,x)=>s+x.paid,0);
  const totalCur = stocks.reduce((s,x)=>s+x.cur,0);
  const totalRet = totalCur - totalPaid;

  document.getElementById('app').innerHTML = `
    <div class="card">💰 Investido: $${totalPaid.toFixed(2)}</div>
    <div class="card">📈 Atual: $${totalCur.toFixed(2)}</div>
    <div class="card">📊 Resultado: $${totalRet.toFixed(2)}</div>

    <h2>Ativos</h2>
    ${stocks.map(s => `
      <div class="card">
        <b>${s.name}</b><br>
        Retorno: ${s.ret}%<br>
        Carteira: ${s.alloc}%
      </div>
    `).join('')}
  `;
}

async function init(){
  try{
    const csv = await fetchCSV();
    const data = parseCSV(csv);
    render(data);
  }catch(e){
    document.getElementById('app').innerHTML = 'Erro ao carregar dados';
    console.error(e);
  }
}

init();

</script>
</body>
</html>
