<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio · Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0e13; --surface: #111620; --surface2: #171d2b;
    --border: #1e2738; --accent: #00e5a0; --accent2: #0099ff;
    --red: #ff4d6d; --text: #e8edf5; --muted: #5a6480; --muted2: #8893aa;
    --ff: 'Syne', sans-serif; --fm: 'DM Mono', monospace;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:var(--ff); min-height:100vh; overflow-x:hidden; }
  body::before {
    content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
    background-image: linear-gradient(rgba(0,229,160,.03) 1px,transparent 1px), linear-gradient(90deg,rgba(0,229,160,.03) 1px,transparent 1px);
    background-size: 40px 40px;
  }
  .container { position:relative; z-index:1; max-width:1400px; margin:0 auto; padding:40px 32px; }

  header { display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:48px; flex-wrap:wrap; gap:16px; }
  .logo h1 { font-size:2rem; font-weight:800; letter-spacing:-.03em; }
  .logo h1 span { color:var(--accent); }
  .logo p { font-family:var(--fm); font-size:.72rem; color:var(--muted); margin-top:6px; letter-spacing:.08em; }
  .stamp { font-family:var(--fm); font-size:.7rem; color:var(--muted); text-align:right; }
  .dot { display:inline-block; width:6px; height:6px; border-radius:50%; background:var(--accent); margin-right:6px; animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:16px; margin-bottom:40px; }
  .card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:24px; position:relative; overflow:hidden; transition:border-color .2s; }
  .card:hover { border-color:var(--accent); }
  .card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,var(--accent),transparent); }
  .card.red::before { background:linear-gradient(90deg,var(--red),transparent); }
  .card.blue::before { background:linear-gradient(90deg,var(--accent2),transparent); }
  .clabel { font-family:var(--fm); font-size:.65rem; letter-spacing:.1em; color:var(--muted); text-transform:uppercase; margin-bottom:12px; }
  .cval { font-size:1.6rem; font-weight:700; letter-spacing:-.02em; line-height:1; }
  .csub { font-family:var(--fm); font-size:.72rem; margin-top:8px; color:var(--muted2); }
  .pos { color:var(--accent); } .neg { color:var(--red); }

  .grid2 { display:grid; grid-template-columns:1fr 340px; gap:24px; align-items:start; }
  @media(max-width:960px){ .grid2 { grid-template-columns:1fr; } }

  .tbox { background:var(--surface); border:1px solid var(--border); border-radius:12px; overflow:hidden; }
  .thead { padding:20px 24px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
  .thead h2 { font-size:.9rem; font-weight:600; }
  .badge { font-family:var(--fm); font-size:.65rem; background:var(--surface2); border:1px solid var(--border); border-radius:20px; padding:3px 10px; color:var(--muted2); }
  table { width:100%; border-collapse:collapse; }
  thead th { font-family:var(--fm); font-size:.62rem; letter-spacing:.08em; color:var(--muted); text-transform:uppercase; padding:12px 16px; text-align:right; border-bottom:1px solid var(--border); white-space:nowrap; }
  thead th:first-child { text-align:left; }
  tbody tr { border-bottom:1px solid var(--border); transition:background .15s; }
  tbody tr:last-child { border-bottom:none; }
  tbody tr:hover { background:var(--surface2); }
  td { padding:14px 16px; text-align:right; font-family:var(--fm); font-size:.78rem; color:var(--muted2); white-space:nowrap; }
  td:first-child { text-align:left; font-family:var(--ff); font-weight:700; font-size:.85rem; color:var(--text); }
  .tag { display:inline-block; background:var(--surface2); border:1px solid; border-radius:6px; padding:2px 8px; font-size:.72rem; letter-spacing:.04em; }
  .pill { display:inline-block; padding:3px 10px; border-radius:20px; font-size:.72rem; font-weight:500; }
  .pill.pos { background:rgba(0,229,160,.12); color:var(--accent); }
  .pill.neg { background:rgba(255,77,109,.12); color:var(--red); }
  .barcell { min-width:110px; }
  .barwrap { display:flex; align-items:center; gap:8px; }
  .barbg { flex:1; height:4px; background:var(--border); border-radius:2px; overflow:hidden; }
  .barfill { height:100%; border-radius:2px; }

  .side { display:flex; flex-direction:column; gap:20px; }
  .pcard { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:20px; }
  .ptitle { font-family:var(--fm); font-size:.62rem; letter-spacing:.1em; color:var(--muted); text-transform:uppercase; margin-bottom:16px; }
  .donutwrap { display:flex; justify-content:center; margin-bottom:16px; }
  svg.donut { transform:rotate(-90deg); }
  .legend { display:flex; flex-direction:column; gap:8px; }
  .litem { display:flex; align-items:center; justify-content:space-between; font-size:.78rem; }
  .lleft { display:flex; align-items:center; gap:8px; }
  .ldot { width:8px; height:8px; border-radius:2px; flex-shrink:0; }
  .lname { color:var(--text); font-weight:600; }
  .lpct { font-family:var(--fm); font-size:.7rem; color:var(--muted2); }
  .pitem { display:flex; align-items:center; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--border); }
  .pitem:last-child { border-bottom:none; }
  .pname { font-weight:600; font-size:.82rem; }
  .pval { font-family:var(--fm); font-size:.75rem; }

  .spin-box { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:300px; gap:16px; }
  .spinner { width:36px; height:36px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .spin-box p { font-family:var(--fm); font-size:.72rem; color:var(--muted); }

  .errbox { background:rgba(255,77,109,.08); border:1px solid rgba(255,77,109,.3); border-radius:10px; padding:24px; text-align:center; }
  .errbox p { font-family:var(--fm); font-size:.82rem; color:var(--red); }
  .errbox small { display:block; margin-top:8px; font-family:var(--fm); font-size:.7rem; color:var(--muted2); }
  .rbtn { display:inline-block; margin-top:14px; background:none; border:1px solid var(--accent); color:var(--accent); padding:7px 18px; border-radius:6px; font-family:var(--ff); font-size:.75rem; cursor:pointer; transition:background .15s; }
  .rbtn:hover { background:rgba(0,229,160,.1); }

  /* debug toggle */
  .dbg-toggle { font-family:var(--fm); font-size:.65rem; color:var(--muted); cursor:pointer; text-decoration:underline; margin-top:8px; display:inline-block; }
  .dbg { margin-top:10px; background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:12px; font-family:var(--fm); font-size:.65rem; color:var(--muted2); max-height:180px; overflow:auto; white-space:pre-wrap; word-break:break-all; display:none; }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo">
      <h1>PORTFÓLIO <span>·</span> INVEST</h1>
      <p>DASHBOARD · ATUALIZAÇÃO AUTOMÁTICA VIA GOOGLE SHEETS</p>
    </div>
    <div class="stamp"><span class="dot"></span><span id="ts">Carregando...</span></div>
  </header>
  <div id="app"><div class="spin-box"><div class="spinner"></div><p>Buscando dados da planilha...</p></div></div>
</div>

<script>
/* ── CONFIG ── */
const SHEET_ID = '13KMh1amahbvivDW1GsEi8UL8qSbrcPDpQlNoLio81oQ';
const GID      = '0'; // 0 = primeira aba

const PAL = ['#00e5a0','#0099ff','#a78bfa','#fbbf24','#f472b6',
             '#34d399','#60a5fa','#fb923c','#e879f9','#22d3ee',
             '#4ade80','#f87171','#818cf8','#facc15','#38bdf8'];

/* ── FETCH gviz JSONP ── */
function loadSheet() {
  return new Promise((ok, fail) => {
    const fn  = '_gviz' + Date.now();
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${GID}&cb=${fn}`;
    const sc  = document.createElement('script');
    sc.src    = url;
    const t   = setTimeout(() => { cleanup(); fail(new Error('Timeout ao buscar dados.')); }, 15000);
    function cleanup() { clearTimeout(t); delete window[fn]; sc.parentNode && sc.parentNode.removeChild(sc); }
    window[fn] = d => { cleanup(); ok(d); };
    sc.onerror = () => { cleanup(); fail(new Error('Falha ao carregar script do Google Sheets.')); };
    document.head.appendChild(sc);
  });
}

/* ── PARSE gviz → rows ── */
function parseGviz(raw) {
  const { cols, rows } = raw.table;
  // Build header list from label first, then id
  const hdrs = cols.map(c => (c.label && c.label.trim() ? c.label.trim() : (c.id||'').trim()));
  const data  = rows.map(r =>
    Object.fromEntries(hdrs.map((h, i) => {
      const cell = r.c ? r.c[i] : null;
      if (!cell) return [h, null];
      // v = raw value (number/string/bool), f = formatted string
      return [h, { v: cell.v, f: cell.f ?? null }];
    }))
  );
  return { hdrs, data };
}

/* ── NUMBER EXTRACTION ──
   gviz sends numbers as JS number type in .v
   strings like "R$ 1.234,56" or "12,5%" come as .f (formatted)
   we try .v first (already a number), then parse .f or .v string */
function num(cell) {
  if (cell === null || cell === undefined) return null;
  // direct object from parseGviz
  const v = (cell && typeof cell === 'object' && 'v' in cell) ? cell.v : cell;
  const f = (cell && typeof cell === 'object' && 'f' in cell) ? cell.f : null;
  if (typeof v === 'number' && !isNaN(v)) return v;
  // try parsing formatted or stringified value
  const src = f ?? String(v ?? '');
  const s = src.replace(/R\$\s?/g,'').replace(/\s/g,'').replace(/\./g,'').replace(',','.').replace('%','').trim();
  if (!s || s === '-') return null;
  const n = parseFloat(s);
  return isNaN(n) ? null : n;
}

function str(cell) {
  if (!cell) return '';
  if (typeof cell === 'object' && 'v' in cell) return String(cell.f ?? cell.v ?? '').trim();
  return String(cell).trim();
}

/* ── FORMAT ── */
const brl = n => (n===null||isNaN(n)) ? '—' : n.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
const pct = n => (n===null||isNaN(n)) ? '—' : (n>0?'+':'')+n.toFixed(2)+'%';
const dec = (n,d=2) => (n===null||isNaN(n)) ? '—' : n.toLocaleString('pt-BR',{minimumFractionDigits:d,maximumFractionDigits:d});

/* ── COLUMN FINDER ── */
function findCol(hdrs, kws) {
  return hdrs.find(h => kws.some(k => h.toLowerCase().includes(k.toLowerCase()))) || null;
}

/* ── DONUT ── */
function donut(items, r=80, sw=22) {
  const c=r+sw, sz=c*2, circ=2*Math.PI*r;
  let off=0, p='';
  items.forEach((it,i)=>{
    const dash=(it.pct/100)*circ;
    p+=`<circle cx="${c}" cy="${c}" r="${r}" fill="none" stroke="${PAL[i%PAL.length]}" stroke-width="${sw}" stroke-dasharray="${dash} ${circ-dash}" stroke-dashoffset="${-off}"/>`;
    off+=dash;
  });
  return `<svg class="donut" width="${sz}" height="${sz}" viewBox="0 0 ${sz} ${sz}">
    <circle cx="${c}" cy="${c}" r="${r}" fill="none" stroke="#1e2738" stroke-width="${sw}"/>
    ${p}</svg>`;
}

/* ── RENDER ── */
function render(hdrs, data) {
  // map columns
  const C = {
    stock:   findCol(hdrs,['stock','ativo','ticker','ação','acao','nome']),
    qty:     findCol(hdrs,['quantidade','qtd','cotas','qty']),
    paid:    findCol(hdrs,['pago','custo','total pago','investido']),
    cur:     findCol(hdrs,['total atual','valor atual','atual']),
    avg:     findCol(hdrs,['médio','medio','avg','preço médio','preco medio']),
    price:   findCol(hdrs,['preço','preco','price','cotação','cotacao']),
    ret:     findCol(hdrs,['retorno','return','ganho','lucro']),
    alloc:   findCol(hdrs,['carteira','%','peso','alloc']),
  };

  const stocks = data
    .map(r => ({
      name:  str(r[C.stock]),
      qty:   num(r[C.qty]),
      paid:  num(r[C.paid]),
      cur:   num(r[C.cur]),
      avg:   num(r[C.avg]),
      price: num(r[C.price]),
      ret:   num(r[C.ret]),
      alloc: num(r[C.alloc]),
    }))
    .filter(s => s.name && s.name.length > 0);

  if (!stocks.length) {
    document.getElementById('app').innerHTML = `
      <div class="errbox">
        <p>⚠ Nenhum ativo encontrado na planilha.</p>
        <small>Colunas detectadas: <strong>${hdrs.join(' | ')}</strong></small>
        <small>Verifique se os nomes das colunas batem com o esperado.</small>
        <br><button class="rbtn" onclick="init()">↻ Tentar novamente</button>
      </div>`;
    return;
  }

  const totPaid = stocks.reduce((s,x)=>s+(x.paid||0),0);
  const totCur  = stocks.reduce((s,x)=>s+(x.cur||0),0);
  const totRet  = totCur - totPaid;
  const totPct  = totPaid ? (totRet/totPaid)*100 : 0;

  const byAlloc = [...stocks].sort((a,b)=>(b.alloc||0)-(a.alloc||0));
  const top5    = [...stocks].filter(s=>s.ret!==null).sort((a,b)=>b.ret-a.ret).slice(0,5);
  const ddata   = byAlloc.filter(s=>s.alloc>0).map(s=>({name:s.name,pct:s.alloc}));

  document.getElementById('ts').textContent = 'Atualizado às '+new Date().toLocaleTimeString('pt-BR');

  document.getElementById('app').innerHTML = `
    <div class="cards">
      <div class="card">
        <div class="clabel">Total Investido</div>
        <div class="cval">${brl(totPaid)}</div>
        <div class="csub">${stocks.length} ativos na carteira</div>
      </div>
      <div class="card blue">
        <div class="clabel">Valor Atual</div>
        <div class="cval">${brl(totCur)}</div>
        <div class="csub">Posição marcada a mercado</div>
      </div>
      <div class="card ${totRet<0?'red':''}">
        <div class="clabel">Resultado Total</div>
        <div class="cval ${totRet>=0?'pos':'neg'}">${totRet>=0?'+':''}${brl(totRet)}</div>
        <div class="csub ${totRet>=0?'pos':'neg'}">${totPct>=0?'+':''}${pct(totPct)} no período</div>
      </div>
      <div class="card">
        <div class="clabel">Ativos Positivos</div>
        <div class="cval pos">${stocks.filter(s=>s.ret!==null&&s.ret>0).length}</div>
        <div class="csub">${stocks.filter(s=>s.ret!==null&&s.ret<0).length} negativos</div>
      </div>
    </div>

    <div class="grid2">
      <div class="tbox">
        <div class="thead">
          <h2>Posições</h2>
          <span class="badge">${stocks.length} ativos</span>
        </div>
        <div style="overflow-x:auto">
          <table>
            <thead><tr>
              <th>Ativo</th><th>Qtd</th><th>P. Médio</th><th>Preço Atual</th>
              <th>Total Pago</th><th>Valor Atual</th><th>Retorno</th><th>Carteira</th>
            </tr></thead>
            <tbody>
              ${stocks.map(s=>{
                const idx=byAlloc.findIndex(x=>x.name===s.name);
                const col=PAL[Math.max(idx,0)%PAL.length];
                return `<tr>
                  <td><span class="tag" style="border-color:${col}44;color:${col}">${s.name}</span></td>
                  <td>${s.qty!==null?dec(s.qty,0):'—'}</td>
                  <td>${s.avg!==null?brl(s.avg):'—'}</td>
                  <td>${s.price!==null?brl(s.price):'—'}</td>
                  <td>${s.paid!==null?brl(s.paid):'—'}</td>
                  <td>${s.cur!==null?brl(s.cur):'—'}</td>
                  <td>${s.ret!==null?`<span class="pill ${s.ret>=0?'pos':'neg'}">${pct(s.ret)}</span>`:'—'}</td>
                  <td class="barcell">
                    <div class="barwrap">
                      <div class="barbg"><div class="barfill" style="width:${Math.min(s.alloc||0,100)}%;background:${col}"></div></div>
                      <span style="font-family:var(--fm);font-size:.68rem;color:var(--muted2);min-width:36px">${s.alloc!==null?s.alloc.toFixed(1)+'%':'—'}</span>
                    </div>
                  </td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>
      </div>

      <div class="side">
        <div class="pcard">
          <div class="ptitle">Alocação da Carteira</div>
          ${ddata.length?`
            <div class="donutwrap">${donut(ddata)}</div>
            <div class="legend">
              ${byAlloc.filter(s=>s.alloc>0).slice(0,12).map((s,i)=>`
                <div class="litem">
                  <div class="lleft"><div class="ldot" style="background:${PAL[i%PAL.length]}"></div><span class="lname">${s.name}</span></div>
                  <span class="lpct">${s.alloc.toFixed(1)}%</span>
                </div>`).join('')}
            </div>`
          :'<p style="color:var(--muted);font-size:.78rem">Sem dados de alocação</p>'}
        </div>

        ${top5.length?`
        <div class="pcard">
          <div class="ptitle">Top Performers</div>
          ${top5.map(s=>`
            <div class="pitem">
              <span class="pname">${s.name}</span>
              <span class="pval ${s.ret>=0?'pos':'neg'}">${pct(s.ret)}</span>
            </div>`).join('')}
        </div>`:''}

        <div style="text-align:center">
          <button class="rbtn" onclick="init()">↻ Atualizar Dados</button>
        </div>
      </div>
    </div>
  `;
}

/* ── INIT ── */
async function init() {
  document.getElementById('app').innerHTML = `<div class="spin-box"><div class="spinner"></div><p>Buscando dados da planilha...</p></div>`;
  try {
    const raw       = await loadSheet();
    const { hdrs, data } = parseGviz(raw);
    if (!data.length) throw new Error('A planilha não retornou nenhuma linha.');
    render(hdrs, data);
  } catch(e) {
    document.getElementById('ts').textContent = 'Erro ao carregar';
    document.getElementById('app').innerHTML = `
      <div class="errbox">
        <p>⚠ Não foi possível carregar os dados</p>
        <small>${e.message}</small>
        <br>
        <button class="rbtn" onclick="init()">↻ Tentar novamente</button>
        <br>
        <span class="dbg-toggle" onclick="document.getElementById('dbg').style.display=document.getElementById('dbg').style.display==='block'?'none':'block'">mostrar detalhes técnicos</span>
        <div class="dbg" id="dbg">Sheet ID: ${SHEET_ID}\nGID: ${GID}\nURL testada: https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${GID}\n\nVerifique:\n1. Planilha está compartilhada como "qualquer pessoa com o link"\n2. O link acima abre no navegador e retorna JSON\n3. Não há erro de rede</div>
      </div>`;
  }
}

init();
setInterval(init, 5 * 60 * 1000);
</script>
</body>
</html>
