<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio · Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0e13;
    --surface: #111620;
    --surface2: #171d2b;
    --border: #1e2738;
    --accent: #00e5a0;
    --accent2: #0099ff;
    --red: #ff4d6d;
    --text: #e8edf5;
    --muted: #5a6480;
    --muted2: #8893aa;
    --font-display: 'Syne', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-display);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 1400px;
    margin: 0 auto;
    padding: 40px 32px;
  }

  header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 48px;
    flex-wrap: wrap;
    gap: 16px;
  }

  .logo-area h1 {
    font-size: 2rem;
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1;
  }
  .logo-area h1 span { color: var(--accent); }
  .logo-area p {
    font-family: var(--font-mono);
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 6px;
    letter-spacing: 0.08em;
  }

  .last-update {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    color: var(--muted);
    text-align: right;
  }
  .last-update .dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    margin-right: 6px;
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.3} }

  .summary-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 40px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .card:hover { border-color: var(--accent); }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), transparent);
  }
  .card.red::before { background: linear-gradient(90deg, var(--red), transparent); }
  .card.blue::before { background: linear-gradient(90deg, var(--accent2), transparent); }

  .card-label {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .card-value { font-size: 1.6rem; font-weight: 700; letter-spacing: -0.02em; line-height: 1; }
  .card-sub { font-family: var(--font-mono); font-size: 0.72rem; margin-top: 8px; color: var(--muted2); }
  .positive { color: var(--accent); }
  .negative { color: var(--red); }

  .main-grid {
    display: grid;
    grid-template-columns: 1fr 340px;
    gap: 24px;
    align-items: start;
  }
  @media (max-width: 960px) { .main-grid { grid-template-columns: 1fr; } }

  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .table-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .table-header h2 { font-size: 0.9rem; font-weight: 600; }
  .count-badge {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3px 10px;
    color: var(--muted2);
  }

  table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
  thead th {
    font-family: var(--font-mono);
    font-size: 0.62rem;
    letter-spacing: 0.08em;
    color: var(--muted);
    text-transform: uppercase;
    padding: 12px 16px;
    text-align: right;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  thead th:first-child { text-align: left; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }
  tbody td { padding: 14px 16px; text-align: right; font-family: var(--font-mono); font-size: 0.78rem; color: var(--muted2); white-space: nowrap; }
  tbody td:first-child { text-align: left; font-family: var(--font-display); font-weight: 700; font-size: 0.85rem; color: var(--text); }

  .ticker-tag {
    display: inline-block;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 2px 8px;
    font-size: 0.72rem;
    letter-spacing: 0.04em;
  }
  .ret-pill { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 0.72rem; font-weight: 500; }
  .ret-pill.pos { background: rgba(0,229,160,0.12); color: var(--accent); }
  .ret-pill.neg { background: rgba(255,77,109,0.12); color: var(--red); }

  .bar-cell { min-width: 100px; }
  .bar-wrap { display: flex; align-items: center; gap: 8px; }
  .bar-bg { flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 2px; }

  .side-panel { display: flex; flex-direction: column; gap: 20px; }
  .panel-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
  .panel-title { font-family: var(--font-mono); font-size: 0.62rem; letter-spacing: 0.1em; color: var(--muted); text-transform: uppercase; margin-bottom: 16px; }

  .donut-wrap { display: flex; justify-content: center; margin-bottom: 16px; }
  svg.donut { transform: rotate(-90deg); }

  .legend { display: flex; flex-direction: column; gap: 8px; }
  .legend-item { display: flex; align-items: center; justify-content: space-between; font-size: 0.78rem; }
  .legend-left { display: flex; align-items: center; gap: 8px; }
  .legend-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
  .legend-name { color: var(--text); font-weight: 600; }
  .legend-pct { font-family: var(--font-mono); font-size: 0.7rem; color: var(--muted2); }

  .perf-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .perf-item:last-child { border-bottom: none; }
  .perf-name { font-weight: 600; font-size: 0.82rem; }
  .perf-val { font-family: var(--font-mono); font-size: 0.75rem; }

  .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 300px; gap: 16px; }
  .spinner { width: 36px; height: 36px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading p { font-family: var(--font-mono); font-size: 0.72rem; color: var(--muted); }

  .error-box { background: rgba(255,77,109,0.08); border: 1px solid rgba(255,77,109,0.3); border-radius: 10px; padding: 20px; text-align: center; color: var(--red); font-family: var(--font-mono); font-size: 0.8rem; }
  .refresh-btn { display: inline-block; margin-top: 12px; background: none; border: 1px solid var(--accent); color: var(--accent); padding: 7px 18px; border-radius: 6px; font-family: var(--font-display); font-size: 0.75rem; cursor: pointer; transition: background 0.15s; }
  .refresh-btn:hover { background: rgba(0,229,160,0.1); }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo-area">
      <h1>PORTFÓLIO <span>·</span> INVEST</h1>
      <p>DASHBOARD · ATUALIZAÇÃO AUTOMÁTICA VIA GOOGLE SHEETS</p>
    </div>
    <div class="last-update">
      <span class="dot"></span>
      <span id="update-time">Carregando...</span>
    </div>
  </header>
  <div id="app">
    <div class="loading">
      <div class="spinner"></div>
      <p>Buscando dados da planilha...</p>
    </div>
  </div>
</div>

<script>
// ── CONFIG ───────────────────────────────────────────────
const SHEET_ID  = '13KMh1amahbvivDW1GsEi8UL8qSbrcPDpQlNoLio81oQ';
const SHEET_GID = '0'; // gid da aba (0 = primeira)
// ─────────────────────────────────────────────────────────

const PALETTE = [
  '#00e5a0','#0099ff','#a78bfa','#fbbf24','#f472b6',
  '#34d399','#60a5fa','#fb923c','#e879f9','#22d3ee',
  '#4ade80','#f87171','#818cf8','#facc15','#38bdf8'
];

// ── PARSE HELPERS ────────────────────────────────────────
function parseNum(val) {
  if (val === null || val === undefined) return null;
  const s = String(val)
    .replace(/R\$\s?/g, '')
    .replace(/\./g, '')
    .replace(',', '.')
    .replace('%', '')
    .trim();
  if (!s || s === '-') return null;
  const n = parseFloat(s);
  return isNaN(n) ? null : n;
}
function fmtBRL(n) {
  if (n === null || isNaN(n)) return '—';
  return n.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
}
function fmtPct(n) {
  if (n === null || isNaN(n)) return '—';
  return (n > 0 ? '+' : '') + n.toFixed(2) + '%';
}
function fmtNum(n, dec = 2) {
  if (n === null || isNaN(n)) return '—';
  return n.toLocaleString('pt-BR', { minimumFractionDigits: dec, maximumFractionDigits: dec });
}

// ── FETCH via gviz JSONP (sem CORS) ─────────────────────
function fetchSheetData() {
  return new Promise((resolve, reject) => {
    const cb = '__gviz_' + Date.now();
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${SHEET_GID}&cb=${cb}`;
    const script = document.createElement('script');
    script.src = url;

    const timer = setTimeout(() => {
      cleanup();
      reject(new Error('Timeout: verifique se a planilha é pública.'));
    }, 15000);

    function cleanup() {
      clearTimeout(timer);
      delete window[cb];
      script.parentNode && script.parentNode.removeChild(script);
    }

    window[cb] = function (data) { cleanup(); resolve(data); };
    script.onerror = () => { cleanup(); reject(new Error('Erro ao carregar script do Google Sheets.')); };
    document.head.appendChild(script);
  });
}

// ── PARSE gviz response ──────────────────────────────────
function parseGviz(data) {
  const { cols, rows } = data.table;
  const headers = cols.map(c => (c.label || c.id || '').trim());
  const parsed = rows.map(r =>
    Object.fromEntries(headers.map((h, i) => {
      const cell = r.c[i];
      // prefer formatted string (f) for currency/pct already formatted; fall back to raw value (v)
      const val = cell ? (cell.v !== null && cell.v !== undefined ? cell.v : '') : '';
      return [h, val];
    }))
  );
  return { headers, rows: parsed };
}

// ── COL FINDER ───────────────────────────────────────────
function col(headers, kws) {
  return headers.find(h => kws.some(k => h.toLowerCase().includes(k.toLowerCase()))) || '';
}

// ── DONUT SVG ────────────────────────────────────────────
function buildDonut(items, r = 80, sw = 22) {
  const cx = r + sw, cy = r + sw, size = cx * 2;
  const circ = 2 * Math.PI * r;
  let off = 0, paths = '';
  items.forEach((it, i) => {
    const dash = (it.pct / 100) * circ;
    paths += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none"
      stroke="${PALETTE[i % PALETTE.length]}" stroke-width="${sw}"
      stroke-dasharray="${dash} ${circ - dash}" stroke-dashoffset="${-off}"/>`;
    off += dash;
  });
  return `<svg class="donut" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#1e2738" stroke-width="${sw}"/>
    ${paths}
  </svg>`;
}

// ── RENDER ───────────────────────────────────────────────
function render({ headers, rows }) {
  const C = {
    stock:    col(headers, ['stock','ativo','ticker','ação','acao','nome']),
    qty:      col(headers, ['quantidade','qtd','cotas','qty']),
    paid:     col(headers, ['pago','custo','investido','total pago']),
    current:  col(headers, ['atual','total atual','value atual']),
    avgPrice: col(headers, ['médio','medio','avg','preço médio','preco medio']),
    price:    col(headers, ['preço','preco','price','cotação','cotacao']),
    retorno:  col(headers, ['retorno','return','ganho','lucro']),
    carteira: col(headers, ['carteira','%','peso','alloc']),
  };

  const stocks = rows.map(r => ({
    name:     String(r[C.stock] ?? '').trim(),
    qty:      parseNum(r[C.qty]),
    paid:     parseNum(r[C.paid]),
    current:  parseNum(r[C.current]),
    avgPrice: parseNum(r[C.avgPrice]),
    price:    parseNum(r[C.price]),
    retorno:  parseNum(r[C.retorno]),
    carteira: parseNum(r[C.carteira]),
  })).filter(s => s.name);

  if (!stocks.length) {
    document.getElementById('app').innerHTML = `
      <div class="error-box">
        ⚠ Nenhum ativo encontrado.<br>
        <small style="opacity:.6">Colunas detectadas: ${headers.join(' | ') || 'nenhuma'}</small><br>
        <button class="refresh-btn" onclick="init()">Tentar novamente</button>
      </div>`;
    return;
  }

  const totalPaid    = stocks.reduce((s,x) => s + (x.paid    || 0), 0);
  const totalCurrent = stocks.reduce((s,x) => s + (x.current || 0), 0);
  const totalRet     = totalCurrent - totalPaid;
  const totalRetPct  = totalPaid ? (totalRet / totalPaid) * 100 : 0;
  const positives    = stocks.filter(s => s.retorno !== null && s.retorno > 0).length;
  const negatives    = stocks.filter(s => s.retorno !== null && s.retorno < 0).length;

  const byCart  = [...stocks].sort((a,b) => (b.carteira||0) - (a.carteira||0));
  const topPerf = [...stocks].filter(s => s.retorno !== null).sort((a,b) => b.retorno - a.retorno).slice(0,5);
  const donutD  = byCart.filter(s => s.carteira > 0).map(s => ({ name: s.name, pct: s.carteira }));

  const rc = totalRet >= 0 ? 'positive' : 'negative';
  document.getElementById('update-time').textContent = 'Atualizado às ' + new Date().toLocaleTimeString('pt-BR');

  document.getElementById('app').innerHTML = `
    <div class="summary-grid">
      <div class="card">
        <div class="card-label">Total Investido</div>
        <div class="card-value">${fmtBRL(totalPaid)}</div>
        <div class="card-sub">${stocks.length} ativos na carteira</div>
      </div>
      <div class="card blue">
        <div class="card-label">Valor Atual</div>
        <div class="card-value">${fmtBRL(totalCurrent)}</div>
        <div class="card-sub">Posição marcada a mercado</div>
      </div>
      <div class="card ${totalRet < 0 ? 'red' : ''}">
        <div class="card-label">Resultado Total</div>
        <div class="card-value ${rc}">${totalRet>=0?'+':''}${fmtBRL(totalRet)}</div>
        <div class="card-sub ${rc}">${totalRetPct>=0?'+':''}${fmtPct(totalRetPct)} no período</div>
      </div>
      <div class="card">
        <div class="card-label">Ativos Positivos</div>
        <div class="card-value positive">${positives}</div>
        <div class="card-sub">${negatives} ativo${negatives!==1?'s':''} negativo${negatives!==1?'s':''}</div>
      </div>
    </div>

    <div class="main-grid">
      <div class="table-wrap">
        <div class="table-header">
          <h2>Posições</h2>
          <span class="count-badge">${stocks.length} ativos</span>
        </div>
        <div style="overflow-x:auto">
          <table>
            <thead><tr>
              <th>Ativo</th><th>Qtd</th><th>P. Médio</th><th>Preço Atual</th>
              <th>Total Pago</th><th>Valor Atual</th><th>Retorno</th><th>Carteira</th>
            </tr></thead>
            <tbody>
              ${stocks.map(s => {
                const idx = byCart.findIndex(x => x.name === s.name);
                const color = PALETTE[Math.max(idx,0) % PALETTE.length];
                return `<tr>
                  <td><span class="ticker-tag" style="border-color:${color}44;color:${color}">${s.name}</span></td>
                  <td>${s.qty      !== null ? fmtNum(s.qty, 0)    : '—'}</td>
                  <td>${s.avgPrice !== null ? fmtBRL(s.avgPrice)  : '—'}</td>
                  <td>${s.price    !== null ? fmtBRL(s.price)     : '—'}</td>
                  <td>${s.paid     !== null ? fmtBRL(s.paid)      : '—'}</td>
                  <td>${s.current  !== null ? fmtBRL(s.current)   : '—'}</td>
                  <td>${s.retorno  !== null
                    ? `<span class="ret-pill ${s.retorno>=0?'pos':'neg'}">${fmtPct(s.retorno)}</span>`
                    : '—'}</td>
                  <td class="bar-cell">
                    <div class="bar-wrap">
                      <div class="bar-bg">
                        <div class="bar-fill" style="width:${Math.min(s.carteira||0,100)}%;background:${color}"></div>
                      </div>
                      <span style="font-family:var(--font-mono);font-size:.68rem;color:var(--muted2);min-width:36px">
                        ${s.carteira !== null ? s.carteira.toFixed(1)+'%' : '—'}
                      </span>
                    </div>
                  </td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>
      </div>

      <div class="side-panel">
        <div class="panel-card">
          <div class="panel-title">Alocação da Carteira</div>
          ${donutD.length
            ? `<div class="donut-wrap">${buildDonut(donutD)}</div>
               <div class="legend">
                 ${byCart.filter(s=>s.carteira>0).slice(0,12).map((s,i) => `
                   <div class="legend-item">
                     <div class="legend-left">
                       <div class="legend-dot" style="background:${PALETTE[i%PALETTE.length]}"></div>
                       <span class="legend-name">${s.name}</span>
                     </div>
                     <span class="legend-pct">${s.carteira.toFixed(1)}%</span>
                   </div>`).join('')}
               </div>`
            : '<p style="color:var(--muted);font-size:.78rem">Sem dados de alocação</p>'}
        </div>

        ${topPerf.length ? `
        <div class="panel-card">
          <div class="panel-title">Top Performers</div>
          ${topPerf.map(s => `
            <div class="perf-item">
              <span class="perf-name">${s.name}</span>
              <span class="perf-val ${s.retorno>=0?'positive':'negative'}">${fmtPct(s.retorno)}</span>
            </div>`).join('')}
        </div>` : ''}

        <div style="text-align:center">
          <button class="refresh-btn" onclick="init()">↻ Atualizar Dados</button>
        </div>
      </div>
    </div>
  `;
}

// ── INIT ─────────────────────────────────────────────────
async function init() {
  document.getElementById('app').innerHTML = `
    <div class="loading"><div class="spinner"></div><p>Buscando dados da planilha...</p></div>`;
  try {
    const raw  = await fetchSheetData();
    const data = parseGviz(raw);
    if (!data.rows.length) throw new Error('Planilha sem linhas de dados.');
    render(data);
  } catch (e) {
    document.getElementById('update-time').textContent = 'Falha ao carregar';
    document.getElementById('app').innerHTML = `
      <div class="error-box">
        ⚠ Não foi possível carregar os dados<br>
        <small style="opacity:.6;display:block;margin-top:6px">${e.message}</small>
        <button class="refresh-btn" onclick="init()">Tentar novamente</button>
      </div>`;
  }
}

init();
setInterval(init, 5 * 60 * 1000); // auto-refresh a cada 5 min
</script>
</body>
</html>
