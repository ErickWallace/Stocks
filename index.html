<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Dashboard de Investimentos</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .cards {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .card {
      flex: 1;
      min-width: 200px;
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
    }

    canvas {
      background: white;
      border-radius: 10px;
      padding: 10px;
      margin-top: 20px;
    }

    select {
      padding: 8px;
      margin-bottom: 20px;
      border-radius: 6px;
    }
  </style>
</head>
<body>

<h1>📊 Dashboard de Investimentos</h1>

<select id="filtroAtivo">
  <option value="Todos">Todos os ativos</option>
</select>

<div class="cards">
  <div class="card">
    <h3>💰 Patrimônio Total</h3>
    <p id="total">-</p>
  </div>
  <div class="card">
    <h3>📈 Rentabilidade (simulada)</h3>
    <p id="rentabilidade">-</p>
  </div>
</div>

<canvas id="linhaChart"></canvas>
<canvas id="pizzaChart"></canvas>

<script>
const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQe-6MygeRUixx0XOdtZrSvlgvBrx82peKMF8tp9IkC_bZkSR_vANXNW3GjuZNkeApQS16AAWQORbHs/pub?output=csv";

let linhaChart = null;
let pizzaChart = null;

async function fetchData() {
  const res = await fetch(url);
  const text = await res.text();
  return parseCSV(text);
}

function parseCSV(data) {
  const linhas = data.trim().split("\n");

  // detecta separador automaticamente
  const separador = linhas[0].includes(";") ? ";" : ",";

  const rows = linhas.map(r => r.split(separador));
  const headers = rows[0].map(h => h.trim());

  return rows.slice(1).map(row => {
    let obj = {};
    headers.forEach((h, i) => obj[h] = row[i]);
    return obj;
  });
}

function calcularIndicadores(data) {
  let total = 0;

  data.forEach(d => {
    const valor = parseFloat((d["Valor Total"] || "0").replace(",", "."));
    total += isNaN(valor) ? 0 : valor;
  });

  return {
    total: total.toFixed(2),
    rentabilidade: (Math.random() * 20 - 10).toFixed(2) + "%"
  };
}

function popularFiltro(data) {
  const ativos = [...new Set(data.map(d => d["Ativo"]).filter(Boolean))];
  const select = document.getElementById("filtroAtivo");

  ativos.forEach(a => {
    let opt = document.createElement("option");
    opt.value = a;
    opt.textContent = a;
    select.appendChild(opt);
  });
}

function gerarGraficoLinha(data) {
  const agrupado = {};

  data.forEach(d => {
    const dataKey = d["Data"];
    const valor = parseFloat((d["Valor Total"] || "0").replace(",", "."));

    if (!agrupado[dataKey]) agrupado[dataKey] = 0;
    agrupado[dataKey] += isNaN(valor) ? 0 : valor;
  });

  const datas = Object.keys(agrupado).sort();
  const valores = datas.map(d => agrupado[d]);

  if (linhaChart) linhaChart.destroy();

  linhaChart = new Chart(document.getElementById("linhaChart"), {
    type: "line",
    data: {
      labels: datas,
      datasets: [{
        label: "Patrimônio ao longo do tempo",
        data: valores,
        borderWidth: 2,
        fill: false
      }]
    }
  });
}

function gerarPizza(data) {
  const agrupado = {};

  data.forEach(d => {
    const ativo = d["Ativo"];
    const valor = parseFloat((d["Valor Total"] || "0").replace(",", "."));

    if (!ativo) return;

    agrupado[ativo] = (agrupado[ativo] || 0) + (isNaN(valor) ? 0 : valor);
  });

  if (pizzaChart) pizzaChart.destroy();

  pizzaChart = new Chart(document.getElementById("pizzaChart"), {
    type: "pie",
    data: {
      labels: Object.keys(agrupado),
      datasets: [{
        data: Object.values(agrupado)
      }]
    }
  });
}

function aplicarFiltro(data) {
  const filtro = document.getElementById("filtroAtivo").value;

  if (filtro === "Todos") return data;

  return data.filter(d => d["Ativo"] === filtro);
}

async function init() {
  let data = await fetchData();

  popularFiltro(data);

  function render() {
    let filtrado = aplicarFiltro(data);

    const indicadores = calcularIndicadores(filtrado);

    document.getElementById("total").innerText = "R$ " + indicadores.total;
    document.getElementById("rentabilidade").innerText = indicadores.rentabilidade;

    gerarGraficoLinha(filtrado);
    gerarPizza(filtrado);
  }

  document.getElementById("filtroAtivo").addEventListener("change", render);

  render();
}

init();
</script>

</body>
</html>
